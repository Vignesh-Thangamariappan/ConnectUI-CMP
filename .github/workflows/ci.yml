name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Android Library
        run: ./gradlew :shared:assembleRelease
        
      - name: Run Tests
        run: ./gradlew :shared:testReleaseUnitTest

  ios:
    name: Build iOS XCFramework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build XCFramework
        run: ./gradlew :shared:assembleConnectUIReleaseXCFramework
        
      - name: Run iOS Tests
        run: ./gradlew :shared:iosSimulatorArm64Test

      - name: Upload XCFramework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CMPUI.xcframework
          path: shared/build/XCFrameworks/release/CMPUI.xcframework

  release:
    name: Create Release Tag
    needs: [android, ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest # Switch to macos to use 'swift package compute-checksum'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          
      - name: Bump version and push tag
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          
      - name: Download XCFramework Artifact
        uses: actions/download-artifact@v4
        with:
          name: CMPUI.xcframework
          path: shared/build/XCFrameworks/release/CMPUI.xcframework

      - name: Zip XCFramework and Compute Checksum
        id: checksum
        run: |
          cd shared/build/XCFrameworks/release/
          zip -r CMPUI.xcframework.zip CMPUI.xcframework
          CHECKSUM=$(swift package compute-checksum CMPUI.xcframework.zip)
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Create a GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_action.outputs.new_tag }}
          name: Release ${{ steps.tag_action.outputs.new_tag }}
          body: |
            ${{ steps.tag_action.outputs.changelog }}
            
            **SPM Checksum**: `${{ steps.checksum.outputs.CHECKSUM }}`
          generate_release_notes: true
          files: shared/build/XCFrameworks/release/CMPUI.xcframework.zip

      - name: Trigger SDK Repo Update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.SDK_REPO_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/CMPUI-SDK/dispatches \
            -d '{"event_type": "core_release", "client_payload": {"tag": "${{ steps.tag_action.outputs.new_tag }}", "checksum": "${{ steps.checksum.outputs.CHECKSUM }}"}}'
