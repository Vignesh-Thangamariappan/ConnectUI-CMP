name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Android Library
        run: ./gradlew :shared:assembleRelease
        
      - name: Run Tests
        run: ./gradlew :shared:testReleaseUnitTest

  ios:
    name: Build iOS XCFramework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build XCFramework
        run: ./gradlew :shared:assembleConnectUIReleaseXCFramework
        
      - name: Run iOS Tests
        run: ./gradlew :shared:iosSimulatorArm64Test

  release:
    name: Create Release Tag
    needs: [android, ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          
      - name: Bump version and push tag
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          
      - name: Create a GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_action.outputs.new_tag }}
          name: Release ${{ steps.tag_action.outputs.new_tag }}
          body: ${{ steps.tag_action.outputs.changelog }}
          generate_release_notes: true
